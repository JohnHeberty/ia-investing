receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  debug:
    verbosity: basic
  file/traces:
    path: /var/lib/otelcol/traces.json
    rotation:
      max_megabytes: 100
      max_backups: 5
  file/metrics:
    path: /var/lib/otelcol/metrics.json
    rotation:
      max_megabytes: 100
      max_backups: 5
  file/logs:
    path: /var/lib/otelcol/logs.json
    rotation:
      max_megabytes: 100
      max_backups: 5

processors:
  batch:
    timeout: 10s
    send_batch_size: 1024

  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug, file/traces]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug, file/metrics]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug, file/logs]
