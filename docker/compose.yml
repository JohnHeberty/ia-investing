name: ia-investing

x-app-environment: &app-environment
  DATABASE__URL: postgresql+asyncpg://app:${APP_DB_PASSWORD:-app-local-only}@postgres:5432/stock_intelligence
  STORAGE__ENDPOINT: http://minio:9000
  STORAGE__ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
  STORAGE__SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio-local-only}
  STORAGE__BUCKET: raw-documents
  TEMPORAL__ADDRESS: temporal:7233
  TELEMETRY__OTLP_ENDPOINT: http://otel-collector:4317
  TELEMETRY__ENABLED: "true"

x-app: &app
  build:
    context: ..
    dockerfile: Dockerfile
  image: ia-investing:0.1.0
  env_file:
    - path: ../.env
      required: false
  environment: *app-environment
  restart: unless-stopped
  read_only: true
  tmpfs: [/tmp]
  security_opt: [no-new-privileges:true]

services:
  # ── PostgreSQL + pgvector ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:0.8.1-pg17
    profiles: [dev, test, observability]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres-local-only}
      POSTGRES_DB: postgres
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-app-local-only}
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init-databases.sh:/docker-entrypoint-initdb.d/10-init-databases.sh:ro
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U postgres -d stock_intelligence"]
      interval: 5s
      timeout: 5s
      retries: 12
    deploy:
      resources:
        limits: { memory: 1536M, cpus: "2.0" }
        reservations: { memory: 512M, cpus: "0.5" }
    restart: unless-stopped

  # ── MinIO (S3 compat) ─────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    profiles: [dev, test]
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-local-only}
    ports: ["9000:9000", "9001:9001"]
    volumes: [miniodata:/data]
    healthcheck:
      test: [CMD, curl, -f, "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12
    deploy:
      resources:
        limits: { memory: 512M, cpus: "1.0" }
        reservations: { memory: 256M, cpus: "0.25" }
    restart: unless-stopped

  # ── MinIO bucket bootstrap ────────────────────────────────────────
  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    profiles: [dev, test]
    depends_on:
      minio: {condition: service_healthy}
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - >-
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}";
        mc mb --ignore-existing local/raw-documents;
        mc version enable local/raw-documents;
        mc anonymous set none local/raw-documents
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-local-only}
    deploy:
      resources:
        limits: { memory: 128M, cpus: "0.5" }
        reservations: { memory: 64M, cpus: "0.25" }
    restart: "no"

  # ── Temporal (workflow orchestration) ──────────────────────────────
  temporal:
    image: temporalio/auto-setup:1.27.2
    profiles: [dev]
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_SEEDS: postgres
      POSTGRES_USER: postgres
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-postgres-local-only}
    ports: ["7233:7233"]
    depends_on:
      postgres: {condition: service_healthy}
    healthcheck:
      test: [CMD, temporal, operator, cluster, health, --address, temporal:7233]
      interval: 10s
      timeout: 5s
      retries: 18
    deploy:
      resources:
        limits: { memory: 1024M, cpus: "1.0" }
        reservations: { memory: 512M, cpus: "0.5" }
    restart: unless-stopped

  # ── Temporal UI ───────────────────────────────────────────────────
  temporal-ui:
    image: temporalio/ui:2.34.0
    profiles: [dev]
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports: ["8081:8080"]
    depends_on:
      temporal: {condition: service_healthy}
    deploy:
      resources:
        limits: { memory: 256M, cpus: "0.5" }
        reservations: { memory: 128M, cpus: "0.25" }
    restart: unless-stopped

  # ── Alembic migrations ────────────────────────────────────────────
  migrate:
    <<: *app
    profiles: [dev, test]
    command: [alembic, upgrade, head]
    depends_on:
      postgres: {condition: service_healthy}
    deploy:
      resources:
        limits: { memory: 256M, cpus: "1.0" }
        reservations: { memory: 128M, cpus: "0.5" }
    restart: "no"

  # ── API server ────────────────────────────────────────────────────
  api:
    <<: *app
    profiles: [dev]
    ports: ["8000:8000"]
    depends_on:
      migrate: {condition: service_completed_successfully}
      minio-init: {condition: service_completed_successfully}
      temporal: {condition: service_healthy}
    healthcheck:
      test: [CMD, curl, -f, "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 12
    deploy:
      resources:
        limits: { memory: 512M, cpus: "1.0" }
        reservations: { memory: 256M, cpus: "0.5" }

  # ── Workers ───────────────────────────────────────────────────────
  worker-data-ingestion:
    <<: *app
    profiles: [dev]
    command: [python, -m, apps.worker]
    environment:
      <<: *app-environment
      DATABASE__URL: postgresql+asyncpg://app:${APP_DB_PASSWORD:-app-local-only}@postgres:5432/stock_intelligence
      STORAGE__ENDPOINT: http://minio:9000
      TEMPORAL__ADDRESS: temporal:7233
      WORKER__CAPABILITY: data-ingestion
    depends_on:
      migrate: {condition: service_completed_successfully}
      minio-init: {condition: service_completed_successfully}
      temporal: {condition: service_healthy}
    deploy:
      resources:
        limits: { memory: 512M, cpus: "1.0" }
        reservations: { memory: 256M, cpus: "0.5" }

  worker-research-agents:
    <<: *app
    profiles: [dev]
    command: [python, -m, apps.worker]
    environment:
      <<: *app-environment
      DATABASE__URL: postgresql+asyncpg://app:${APP_DB_PASSWORD:-app-local-only}@postgres:5432/stock_intelligence
      TEMPORAL__ADDRESS: temporal:7233
      WORKER__CAPABILITY: research-agents
      AI__PROVIDER: mock
    depends_on:
      migrate: {condition: service_completed_successfully}
      temporal: {condition: service_healthy}
    deploy:
      resources:
        limits: { memory: 512M, cpus: "1.0" }
        reservations: { memory: 256M, cpus: "0.5" }

  worker-portfolio-risk:
    <<: *app
    profiles: [dev]
    command: [python, -m, apps.worker]
    environment:
      <<: *app-environment
      DATABASE__URL: postgresql+asyncpg://app:${APP_DB_PASSWORD:-app-local-only}@postgres:5432/stock_intelligence
      TEMPORAL__ADDRESS: temporal:7233
      WORKER__CAPABILITY: portfolio-risk
    depends_on:
      migrate: {condition: service_completed_successfully}
      temporal: {condition: service_healthy}
    deploy:
      resources:
        limits: { memory: 512M, cpus: "1.0" }
        reservations: { memory: 256M, cpus: "0.5" }

  # ── Scheduler ─────────────────────────────────────────────────────
  scheduler:
    <<: *app
    profiles: [schedules]
    command: [python, -m, apps.scheduler.main]
    environment:
      <<: *app-environment
      TEMPORAL__ADDRESS: temporal:7233
      SCHEDULER__CVM_CNPJ: ${SCHEDULER__CVM_CNPJ:-}
      SCHEDULER__CVM_ISSUER_ID: ${SCHEDULER__CVM_ISSUER_ID:-}
      SCHEDULER__PAPER_PORTFOLIO_ID: ${SCHEDULER__PAPER_PORTFOLIO_ID:-}
      SCHEDULER__PAPER_ORGANIZATION_ID: ${SCHEDULER__PAPER_ORGANIZATION_ID:-}
      SCHEDULER__PAPER_PORTFOLIO_VERSION_ID: ${SCHEDULER__PAPER_PORTFOLIO_VERSION_ID:-}
      SCHEDULER__PAPER_REBALANCE_INPUT_SHA256: ${SCHEDULER__PAPER_REBALANCE_INPUT_SHA256:-}
    depends_on:
      migrate: {condition: service_completed_successfully}
      temporal: {condition: service_healthy}
    deploy:
      resources:
        limits: { memory: 256M, cpus: "0.5" }
        reservations: { memory: 128M, cpus: "0.25" }
    restart: "no"

  # ── Observability (optional) ──────────────────────────────────────
  otel-init:
    image: alpine:3.22
    profiles: [observability]
    command: [chown, -R, "10001:10001", /var/lib/otelcol]
    volumes:
      - oteldata:/var/lib/otelcol
    deploy:
      resources:
        limits: { memory: 64M, cpus: "0.25" }
    restart: "no"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    profiles: [observability]
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel/config.yaml:/etc/otelcol/config.yaml:ro
      - oteldata:/var/lib/otelcol
    ports: ["4317:4317", "4318:4318", "13133:13133"]
    healthcheck:
      test: [CMD, /otelcol-contrib, components]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      otel-init: {condition: service_completed_successfully}
    deploy:
      resources:
        limits: { memory: 256M, cpus: "0.5" }
        reservations: { memory: 128M, cpus: "0.25" }
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.14.0
    profiles: [observability]
    command:
      - mlflow
      - server
      - --host=0.0.0.0
      - --port=5000
      - --backend-store-uri=postgresql://postgres:${POSTGRES_PASSWORD:-postgres-local-only}@postgres:5432/mlflow
    ports: ["5000:5000"]
    depends_on:
      postgres: {condition: service_healthy}
    deploy:
      resources:
        limits: { memory: 512M, cpus: "1.0" }
        reservations: { memory: 256M, cpus: "0.5" }
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
  oteldata:
