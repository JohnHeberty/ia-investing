name: CI

"on":
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.11.29"

jobs:
  quality:
    name: Quality and tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: "3.12.7"
          enable-cache: true

      - name: Install project
        run: uv sync --all-extras --dev

      - name: Create report directory
        run: mkdir -p reports

      - name: Ruff lint
        shell: bash
        run: |
          set -o pipefail
          uv run ruff check . | tee reports/ruff-check.txt

      - name: Ruff format baseline
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          uv run ruff format --check . | tee reports/ruff-format.txt

      - name: Compile imports
        run: uv run python -m compileall -q src

      - name: Validate versioned agent artifacts and eval datasets
        run: |
          uv run python -c "from pathlib import Path; from ia_investing.ai.artifacts import ArtifactLoader; ArtifactLoader(Path('prompts')).load_registry()"
          uv run python scripts/validate_agent_evals.py
          uv run python scripts/export_openapi.py --check

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install and validate frontend
        working-directory: web
        run: |
          npm ci
          npm run generate:api:check
          npm run lint
          npm run typecheck
          npm run test
          npm run build
          npx playwright install --with-deps chromium webkit
          npm run test:e2e

      - name: Strict type baseline
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          uv run mypy src | tee reports/mypy.txt

      - name: Unit tests and coverage
        shell: bash
        run: |
          set -o pipefail
          uv run pytest -q \
            --junitxml=reports/pytest.xml \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:reports/coverage.xml \
            | tee reports/pytest-coverage.txt

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quality-reports-${{ github.sha }}
          path: reports/
          if-no-files-found: error
          retention-days: 30

  security-baseline:
    name: Security baseline
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: "3.12.7"
          enable-cache: true

      - name: Create report directory
        run: mkdir -p reports

      - name: Export runtime dependencies
        run: uv export --no-dev --no-hashes --output-file reports/runtime-requirements.txt

      - name: Dependency audit baseline
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          uvx pip-audit \
            --requirement reports/runtime-requirements.txt \
            --format json \
            --output reports/pip-audit.json

      - name: Secret scan baseline
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          uvx detect-secrets scan --all-files \
            --exclude-files '(^|/)(\.git|\.cache|\.venv)/' \
            --exclude-files 'docs/books/.*' \
            --exclude-files 'docs/plan/.*\.pdf' \
            > reports/detect-secrets.json

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-reports-${{ github.sha }}
          path: reports/
          if-no-files-found: warn
          retention-days: 30
