# Root docker-compose.yml — delegates to docker/compose.yml via include.
# Usage:
#   docker compose up -d                        # full dev stack (postgres+minio+temporal+api+workers)
#   docker compose --profile test up -d         # postgres + minio + migrations only
#   docker compose --profile observability up -d  # adds otel-collector + mlflow
#
# All resource limits and service definitions live in docker/compose.yml.

include:
  - path: docker/compose.yml
